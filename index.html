<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Remix - Official Website</title>
    <meta name="description"
        content="Remix is Stoats's first music bot. Play music from YouTube and other popular streaming services, create playlists, and customize the bot's settings and behavior.">
    <meta name="keywords" content="Remix, Revolt, Stoat, music bot, YouTube, playlists, commands, settings">
    <link rel="icon" href="./src/assets/icon.png" alt="Remix icon">
    <link rel="stylesheet" href="./src/styles/style.css" />
    <style>
      * {
        scroll-behavior: smooth;
      }
      .floating {
        animation-name: floating;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
      }
      @keyframes floating {
        0% { transform: translate(0,  0px); }
        50%  { transform: translate(0, 15px); }
        100%   { transform: translate(0, -0px); }
      }
      @media screen and (max-width: 740px) {
        #teamContainer {
          flex-direction: column;
          align-items: center;
        }
      }
      .padding {
        padding-top: 2rem;
        padding-bottom: 2rem;
        padding-left: 1rem;
        padding-right: 1rem;
      }
    </style>
  </head>
  <body style="color: white">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
